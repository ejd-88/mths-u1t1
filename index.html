<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathematical Methods · Unit 1 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #4f8ef7;
    --accent2: #f7c94f;
    --green: #4fca7a;
    --red: #f7614f;
    --text: #e8eaf0;
    --muted: #7a839a;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 16px 60px;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(79,142,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 52px 0 36px;
    width: 100%;
    max-width: 760px;
  }

  .school-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.25);
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 10px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent2);
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  /* Topic filter */
  .filter-bar {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 32px;
    max-width: 760px;
    width: 100%;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 7px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn:hover:not(.disabled-topic) { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--white);
  }

  .filter-btn.disabled-topic {
    opacity: 0.35;
    cursor: not-allowed;
    text-decoration: line-through;
    pointer-events: none;
  }

  .topic-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    background: rgba(122,131,154,0.2);
    color: var(--muted);
    padding: 2px 7px;
    border-radius: 100px;
    margin-left: 6px;
    vertical-align: middle;
    text-decoration: none;
  }

  /* Score display */
  .score-bar {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    max-width: 760px;
    width: 100%;
  }

  .score-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .score-pill .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-pill .value {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--white);
    line-height: 1;
  }

  .score-pill .value span { color: var(--accent2); }

  /* Question card */
  #quiz-area {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 760px;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .q-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .q-topic {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1px solid;
  }

  .topic-1 { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
  .topic-2 { color: #f7c94f; border-color: rgba(247,201,79,0.3); background: rgba(247,201,79,0.08); }
  .topic-3 { color: #4f8ef7; border-color: rgba(79,142,247,0.3); background: rgba(79,142,247,0.08); }
  .topic-4 { color: #4fca7a; border-color: rgba(79,202,122,0.3); background: rgba(79,202,122,0.08); }
  .topic-5 { color: #f78c4f; border-color: rgba(247,140,79,0.3); background: rgba(247,140,79,0.08); }

  .q-text {
    font-size: 17px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 22px;
    font-weight: 400;
  }

  .q-text code {
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 15px;
    color: var(--accent2);
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(79,142,247,0.06);
  }

  .option.disabled { cursor: default; }

  .opt-letter {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    min-width: 22px;
    height: 22px;
    border-radius: 6px;
    background: var(--border);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .opt-text {
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
  }

  /* Answer states */
  .option.correct {
    border-color: var(--green);
    background: rgba(79,202,122,0.08);
  }
  .option.correct .opt-letter { background: var(--green); color: var(--bg); }

  .option.incorrect {
    border-color: var(--red);
    background: rgba(247,97,79,0.08);
  }
  .option.incorrect .opt-letter { background: var(--red); color: var(--bg); }

  .option.show-correct {
    border-color: var(--green);
    background: rgba(79,202,122,0.05);
    opacity: 0.7;
  }
  .option.show-correct .opt-letter { background: var(--green); color: var(--bg); }

  /* Feedback */
  .feedback {
    display: none;
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    animation: fadeUp 0.3s ease both;
  }

  .feedback.correct-fb {
    display: block;
    background: rgba(79,202,122,0.1);
    border: 1px solid rgba(79,202,122,0.3);
    color: var(--green);
  }

  .feedback.incorrect-fb {
    display: block;
    background: rgba(247,97,79,0.1);
    border: 1px solid rgba(247,97,79,0.3);
    color: var(--text);
  }

  .feedback strong { font-weight: 600; }

  /* Navigation */
  .nav-row {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    max-width: 760px;
    width: 100%;
    margin-bottom: 32px;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: var(--white);
  }
  .btn-primary:hover { background: #6ba3f9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Summary screen */
  #summary {
    display: none;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 760px;
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 32px;
    margin-bottom: 20px;
  }

  .big-score {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    color: var(--accent2);
    line-height: 1;
    margin-bottom: 8px;
  }

  .summary-msg {
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .summary-breakdown {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .breakdown-item {
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .bd-correct { background: rgba(79,202,122,0.1); color: var(--green); border: 1px solid rgba(79,202,122,0.2); }
  .bd-incorrect { background: rgba(247,97,79,0.1); color: var(--red); border: 1px solid rgba(247,97,79,0.2); }

  /* Progress dots */
  .progress-dots {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-width: 760px;
    width: 100%;
    margin-bottom: 24px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .dot.answered-correct { background: var(--green); }
  .dot.answered-incorrect { background: var(--red); }
  .dot.current { background: var(--accent); }

  .progress-label {
    position: relative;
    z-index: 1;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    max-width: 760px;
    width: 100%;
    margin-bottom: 18px;
  }
</style>
</head>
<body>

<header>
  <div class="school-tag">St Patrick's College · Shorncliffe</div>
  <h1>Mathematical Methods<br><em>Unit 1 Quiz</em></h1>
  <p class="subtitle">FIA2 revision — Topics 2, 3 & 4</p>
</header>

<!-- Topic filter -->
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-topic="all">Assessment Topics</button>
  <button class="filter-btn disabled-topic" data-topic="1" title="Not assessed in FIA2">T1: Surds & Quadratics <span class="topic-badge">not assessed</span></button>
  <button class="filter-btn" data-topic="2">T2: Binomials & Cubics</button>
  <button class="filter-btn" data-topic="3">T3: Functions & Relations</button>
  <button class="filter-btn" data-topic="4">T4: Trigonometry</button>
  <button class="filter-btn disabled-topic" data-topic="5" title="Not assessed in FIA2">T5: Probability <span class="topic-badge">not assessed</span></button>
</div>

<!-- Score bar -->
<div class="score-bar">
  <div class="score-pill">
    <span class="label">Score</span>
    <div class="value" id="scoreDisplay">0<span>/0</span></div>
  </div>
  <div class="score-pill">
    <span class="label">Question</span>
    <div class="value" id="qNumDisplay">1<span>/10</span></div>
  </div>
  <div class="score-pill">
    <span class="label">Accuracy</span>
    <div class="value" id="accDisplay">—<span>%</span></div>
  </div>
</div>

<!-- Progress -->
<div class="progress-dots" id="progressDots"></div>
<div class="progress-label" id="progressLabel"></div>

<!-- Quiz area -->
<div id="quiz-area"></div>

<!-- Nav -->
<div class="nav-row">
  <button class="btn btn-ghost" id="shuffleBtn">↺ New Set</button>
  <button class="btn btn-primary" id="nextBtn" disabled>Next →</button>
</div>

<!-- Summary -->
<div id="summary">
  <div class="summary-card">
    <div class="big-score" id="finalScore">0</div>
    <div class="summary-msg" id="summaryMsg"></div>
    <div class="summary-breakdown">
      <div class="breakdown-item bd-correct" id="bdCorrect">✓ 0 correct</div>
      <div class="breakdown-item bd-incorrect" id="bdIncorrect">✗ 0 incorrect</div>
    </div>
  </div>
  <button class="btn btn-primary" id="restartBtn" style="margin:0 auto;display:block;">Try Another Set</button>
</div>

<script>
const ALL_QUESTIONS = [
  // Topic 1: Surds & Quadratics
  {
    topic: 1,
    text: "Which of the following is the simplified form of √48?",
    options: ["4√3", "6√2", "3√4", "2√12"],
    answer: 0,
    explanation: "√48 = √(16 × 3) = 4√3. We look for the largest perfect square factor of 48, which is 16."
  },
  {
    topic: 1,
    text: "What is the discriminant of the quadratic 2x² − 5x + 3?",
    options: ["1", "−1", "25", "49"],
    answer: 0,
    explanation: "The discriminant is b² − 4ac = (−5)² − 4(2)(3) = 25 − 24 = 1. Since Δ > 0, the equation has two distinct real roots."
  },
  {
    topic: 1,
    text: "Which expression is equivalent to (√5 + √3)²?",
    options: ["8 + 2√15", "8", "√8 + √6", "15 + 2√15"],
    answer: 0,
    explanation: "(√5 + √3)² = 5 + 2√15 + 3 = 8 + 2√15. Use the expansion (a+b)² = a² + 2ab + b²."
  },
  {
    topic: 1,
    text: "A quadratic function has a turning point at (−2, 5) and passes through (0, 1). What is the value of a in y = a(x + 2)² + 5?",
    options: ["−1", "1", "−4", "4"],
    answer: 0,
    explanation: "Substituting (0, 1): 1 = a(2)² + 5 → 1 = 4a + 5 → a = −1."
  },
  {
    topic: 1,
    text: "Rationalise the denominator of 6 / (2 + √3).",
    options: ["12 − 6√3", "6(2 − √3)", "2(12 − 6√3)", "3 − 2√3"],
    answer: 0,
    explanation: "Multiply numerator and denominator by the conjugate (2 − √3): 6(2 − √3) / ((2)² − (√3)²) = 6(2 − √3) / (4 − 3) = 6(2 − √3) = 12 − 6√3."
  },

  // Topic 2: Binomials & Cubics
  {
    topic: 2,
    text: "In the expansion of (x + 2)⁵, what is the coefficient of x³?",
    options: ["40", "10", "80", "20"],
    answer: 0,
    explanation: "Using the binomial theorem, the term with x³ is C(5,2)·x³·2² = 10·x³·4 = 40x³. So the coefficient is 40."
  },
  {
    topic: 2,
    text: "Which of the following is a factor of x³ − 3x² − 4x + 12?",
    options: ["(x − 3)", "(x + 4)", "(x − 4)", "(x + 2)"],
    answer: 0,
    explanation: "By the factor theorem, test x = 3: 27 − 27 − 12 + 12 = 0. So (x − 3) is a factor."
  },
  {
    topic: 2,
    text: "What is the value of C(7, 3)?",
    options: ["35", "21", "42", "70"],
    answer: 0,
    explanation: "C(7,3) = 7! / (3! × 4!) = (7 × 6 × 5) / (3 × 2 × 1) = 210 / 6 = 35."
  },
  {
    topic: 2,
    text: "The graph of y = a(x − h)³ + k has a point of inflection at:",
    options: ["(h, k)", "(0, 0)", "(−h, −k)", "(k, h)"],
    answer: 0,
    explanation: "The point of inflection of y = a(x − h)³ + k is always at (h, k), where the cubic transitions from concave up to concave down (or vice versa)."
  },
  {
    topic: 2,
    text: "The third row of Pascal's triangle is 1 2 1. What is the second term in the expansion of (x + y)⁴?",
    options: ["4x³y", "4xy³", "6x²y²", "x⁴"],
    answer: 0,
    explanation: "Using the binomial theorem for (x + y)⁴, the second term is C(4,1)·x³·y = 4x³y."
  },

  // Topic 3: Functions & Relations
  {
    topic: 3,
    text: "Which test determines whether a graph represents a function?",
    options: ["Vertical line test", "Horizontal line test", "Symmetry test", "Intercept test"],
    answer: 0,
    explanation: "The vertical line test states that if any vertical line intersects the graph more than once, the relation is NOT a function. A function must assign exactly one output to each input."
  },
  {
    topic: 3,
    text: "What is the domain of the function f(x) = √(x − 4)?",
    options: ["[4, ∞)", "(−∞, 4]", "(4, ∞)", "ℝ"],
    answer: 0,
    explanation: "For the square root to be defined, we need x − 4 ≥ 0, so x ≥ 4. In interval notation, the domain is [4, ∞)."
  },
  {
    topic: 3,
    text: "The graph of y = a/(x − h) + k is a hyperbola. Its vertical asymptote is at:",
    options: ["x = h", "y = k", "x = −h", "y = −k"],
    answer: 0,
    explanation: "The denominator equals zero when x = h, making that the vertical asymptote. The horizontal asymptote is at y = k."
  },
  {
    topic: 3,
    text: "If f(x) = x² + 1 and g(x) = 3x, which of the following is f(g(2))?",
    options: ["37", "13", "25", "36"],
    answer: 0,
    explanation: "First calculate g(2) = 3(2) = 6. Then f(6) = 6² + 1 = 36 + 1 = 37."
  },
  {
    topic: 3,
    text: "The graph of y = f(x + 3) compared to y = f(x) is shifted:",
    options: ["3 units left", "3 units right", "3 units up", "3 units down"],
    answer: 0,
    explanation: "Replacing x with (x + 3) causes a horizontal shift of 3 units to the LEFT. Remember: y = f(x + c) shifts left by c; y = f(x − c) shifts right by c."
  },
  {
    topic: 3,
    text: "Which equation represents the circle with centre (2, −3) and radius 5?",
    options: ["(x−2)² + (y+3)² = 25", "(x+2)² + (y−3)² = 25", "(x−2)² + (y+3)² = 5", "(x+2)² + (y−3)² = 5"],
    answer: 0,
    explanation: "The standard form is (x − h)² + (y − k)² = r². With centre (2, −3) and radius 5: (x − 2)² + (y − (−3))² = 25, which simplifies to (x − 2)² + (y + 3)² = 25."
  },
  {
    topic: 3,
    text: "A piece-wise function is defined as f(x) = {2x + 1 for x < 0, x² for x ≥ 0}. What is f(−3)?",
    options: ["−5", "9", "−6", "1"],
    answer: 0,
    explanation: "Since x = −3 < 0, we use the first rule: f(−3) = 2(−3) + 1 = −6 + 1 = −5."
  },

  // Topic 4: Trigonometry
  {
    topic: 4,
    text: "Convert 270° to radians.",
    options: ["3π/2", "π/2", "2π/3", "3π/4"],
    answer: 0,
    explanation: "To convert degrees to radians, multiply by π/180. So 270 × π/180 = 270π/180 = 3π/2."
  },
  {
    topic: 4,
    text: "What is the exact value of sin(π/6)?",
    options: ["1/2", "√3/2", "√2/2", "1"],
    answer: 0,
    explanation: "sin(π/6) = sin(30°) = 1/2. This is one of the standard exact values from the unit circle that must be memorised."
  },
  {
    topic: 4,
    text: "The function y = 3sin(2x) has an amplitude and period of:",
    options: ["Amplitude 3, Period π", "Amplitude 3, Period 2π", "Amplitude 6, Period π", "Amplitude 2, Period 3π"],
    answer: 0,
    explanation: "For y = a·sin(bx), amplitude = |a| = 3, and period = 2π/b = 2π/2 = π."
  },
  {
    topic: 4,
    text: "Using the Pythagorean identity, if sin(θ) = 3/5, what is cos²(θ)?",
    options: ["16/25", "9/25", "4/5", "7/25"],
    answer: 0,
    explanation: "From sin²(θ) + cos²(θ) = 1: cos²(θ) = 1 − sin²(θ) = 1 − 9/25 = 16/25."
  },
  {
    topic: 4,
    text: "An arc of a circle has radius 6 cm and subtends an angle of π/3 radians. What is its length?",
    options: ["2π cm", "π cm", "3π cm", "6π cm"],
    answer: 0,
    explanation: "Arc length = rθ = 6 × π/3 = 6π/3 = 2π cm."
  },
  {
    topic: 4,
    text: "The graph of y = cos(x − π/4) compared to y = cos(x) is shifted:",
    options: ["π/4 to the right", "π/4 to the left", "π/4 upward", "π/4 downward"],
    answer: 0,
    explanation: "y = cos(x − π/4) uses the form y = f(x − c) with c = π/4 > 0, which causes a horizontal shift of π/4 units to the RIGHT (a phase shift)."
  },
  {
    topic: 4,
    text: "What is the exact value of tan(π/4)?",
    options: ["1", "0", "√3", "1/√3"],
    answer: 0,
    explanation: "tan(π/4) = tan(45°) = sin(45°)/cos(45°) = (√2/2)/(√2/2) = 1."
  },

  // Topic 5: Probability
  {
    topic: 5,
    text: "If P(A) = 0.4 and P(B) = 0.3, and A and B are independent events, what is P(A ∩ B)?",
    options: ["0.12", "0.7", "0.1", "0.34"],
    answer: 0,
    explanation: "For independent events, P(A ∩ B) = P(A) × P(B) = 0.4 × 0.3 = 0.12."
  },
  {
    topic: 5,
    text: "What is the conditional probability P(A|B) if P(A ∩ B) = 0.2 and P(B) = 0.5?",
    options: ["0.4", "0.7", "0.1", "0.25"],
    answer: 0,
    explanation: "P(A|B) = P(A ∩ B) / P(B) = 0.2 / 0.5 = 0.4. This is the definition of conditional probability."
  },
  {
    topic: 5,
    text: "Two events A and B are mutually exclusive. If P(A) = 0.3, what is the maximum value P(B) can take?",
    options: ["0.7", "0.3", "1.0", "0.5"],
    answer: 0,
    explanation: "Mutually exclusive means P(A ∩ B) = 0, so P(A ∪ B) = P(A) + P(B) ≤ 1. Therefore P(B) ≤ 1 − 0.3 = 0.7."
  },
  {
    topic: 5,
    text: "In a class of 30 students, 18 play sport and 12 study music. If 5 do both, how many do neither?",
    options: ["5", "3", "0", "7"],
    answer: 0,
    explanation: "By inclusion-exclusion: |Sport ∪ Music| = 18 + 12 − 5 = 25. Students doing neither = 30 − 25 = 5."
  },
  {
    topic: 5,
    text: "Events A and B are independent if and only if:",
    options: ["P(A ∩ B) = P(A)·P(B)", "P(A ∪ B) = P(A) + P(B)", "P(A|B) = P(B)", "P(A ∩ B) = 0"],
    answer: 0,
    explanation: "The formal definition of independence is P(A ∩ B) = P(A) × P(B). This is equivalent to P(A|B) = P(A) — knowing B occurred doesn't change the probability of A."
  }
];

// Shuffle array
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Shuffle options keeping track of correct answer
function shuffleOptions(q) {
  const letters = ['A','B','C','D'];
  const indices = [0,1,2,3];
  const shuffled = shuffle(indices);
  const newOptions = shuffled.map(i => q.options[i]);
  const newAnswer = shuffled.indexOf(q.answer);
  return { ...q, options: newOptions, answer: newAnswer };
}

let questions = [];
let currentIdx = 0;
let score = 0;
let answered = [];
let selectedTopic = 'all';
const QS_PER_ROUND = 10;

const ASSESSED_TOPICS = [2, 3, 4];

function getFilteredQuestions() {
  let pool;
  if (selectedTopic === 'all') {
    pool = ALL_QUESTIONS.filter(q => ASSESSED_TOPICS.includes(q.topic));
  } else {
    pool = ALL_QUESTIONS.filter(q => q.topic == selectedTopic);
  }
  return shuffle(pool).slice(0, QS_PER_ROUND).map(shuffleOptions);
}

function initQuiz() {
  questions = getFilteredQuestions();
  currentIdx = 0;
  score = 0;
  answered = new Array(questions.length).fill(null);
  document.getElementById('summary').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.querySelector('.nav-row').style.display = 'flex';
  document.querySelector('.score-bar').style.display = 'flex';
  document.querySelector('.progress-dots').style.display = 'flex';
  renderDots();
  renderQuestion();
  updateScore();
}

function renderDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    if (answered[i] !== null) d.classList.add(answered[i] ? 'answered-correct' : 'answered-incorrect');
    if (i === currentIdx) d.classList.add('current');
    container.appendChild(d);
  });
  document.getElementById('progressLabel').textContent =
    `Question ${currentIdx + 1} of ${questions.length}`;
}

function renderQuestion() {
  const q = questions[currentIdx];
  const letters = ['A','B','C','D'];
  const area = document.getElementById('quiz-area');

  const topicNames = {1:'Topic 1', 2:'Topic 2', 3:'Topic 3', 4:'Topic 4', 5:'Topic 5'};

  const optionsHtml = q.options.map((opt, i) => `
    <button class="option" data-idx="${i}">
      <span class="opt-letter">${letters[i]}</span>
      <span class="opt-text">${opt}</span>
    </button>
  `).join('');

  area.innerHTML = `
    <div class="q-card" id="qCard">
      <div class="q-meta">
        <span class="q-number">Q${currentIdx + 1}</span>
        <span class="q-topic topic-${q.topic}">${topicNames[q.topic]}</span>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback" id="feedback"></div>
    </div>
  `;

  document.getElementById('nextBtn').disabled = true;

  area.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx)));
  });

  updateScore();
  renderDots();
}

function handleAnswer(chosen) {
  const q = questions[currentIdx];
  const isCorrect = chosen === q.answer;
  const feedback = document.getElementById('feedback');
  const opts = document.querySelectorAll('.option');

  opts.forEach(o => o.classList.add('disabled'));
  opts[chosen].classList.add(isCorrect ? 'correct' : 'incorrect');
  if (!isCorrect) opts[q.answer].classList.add('show-correct');

  if (isCorrect) {
    feedback.className = 'feedback correct-fb';
    feedback.innerHTML = `<strong>✓ Correct!</strong> ${q.explanation}`;
    if (answered[currentIdx] === null) score++;
  } else {
    feedback.className = 'feedback incorrect-fb';
    feedback.innerHTML = `<strong>✗ Incorrect.</strong> The correct answer was <strong>${['A','B','C','D'][q.answer]}: ${q.options[q.answer]}</strong>. ${q.explanation}`;
  }

  if (answered[currentIdx] === null) answered[currentIdx] = isCorrect;

  document.getElementById('nextBtn').disabled = false;
  updateScore();
  renderDots();
}

function updateScore() {
  const answered_count = answered.filter(a => a !== null).length;
  document.getElementById('scoreDisplay').innerHTML = `${score}<span>/${answered_count}</span>`;
  document.getElementById('qNumDisplay').innerHTML = `${currentIdx + 1}<span>/${questions.length}</span>`;
  const acc = answered_count > 0 ? Math.round((score / answered_count) * 100) : null;
  document.getElementById('accDisplay').innerHTML = acc !== null ? `${acc}<span>%</span>` : `—<span>%</span>`;
}

function showSummary() {
  document.getElementById('quiz-area').style.display = 'none';
  document.querySelector('.nav-row').style.display = 'none';
  document.querySelector('.progress-dots').style.display = 'none';
  document.getElementById('progressLabel').style.display = 'none';

  const correct = answered.filter(a => a === true).length;
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);

  const msgs = [
    [90, "Outstanding! Brilliant work. 🎉"],
    [70, "Great effort! Keep pushing. 💪"],
    [50, "Good start — revise and retry. 📖"],
    [0,  "Keep practising — you've got this! 🔄"]
  ];
  const msg = msgs.find(([min]) => pct >= min)[1];

  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('summaryMsg').textContent = msg;
  document.getElementById('bdCorrect').textContent = `✓ ${correct} correct`;
  document.getElementById('bdIncorrect').textContent = `✗ ${total - correct} incorrect`;

  document.getElementById('summary').style.display = 'block';
}

// Events
document.getElementById('nextBtn').addEventListener('click', () => {
  currentIdx++;
  if (currentIdx >= questions.length) {
    showSummary();
  } else {
    renderQuestion();
  }
});

document.getElementById('shuffleBtn').addEventListener('click', initQuiz);
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('progressLabel').style.display = 'block';
  initQuiz();
});

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn || btn.classList.contains('disabled-topic')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTopic = btn.dataset.topic;
  initQuiz();
});

// Start
initQuiz();
</script>
